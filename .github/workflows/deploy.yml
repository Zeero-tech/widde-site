name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js ${{ vars.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          PUBLIC_POSTHOG_PROJECT_TOKEN: ${{ vars.PUBLIC_POSTHOG_PROJECT_TOKEN }}
          PUBLIC_POSTHOG_HOST: ${{ vars.PUBLIC_POSTHOG_HOST }}

      - name: Arquivar Build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Arquivar Configurações Firebase
        uses: actions/upload-artifact@v4
        with:
          name: firebase-config
          path: |
            ./firebase.json
            ./.firebaserc

  deploy:
    name: Deploy Production
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Download Configurações Firebase
        uses: actions/download-artifact@v4
        with:
          name: firebase-config
          path: .

      - name: Deploy para Firebase
        uses: w9jds/firebase-action@v13.0.3
        with:
          args: deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT_ID }} --config ./firebase.json
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
